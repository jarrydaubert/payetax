name: 🚀 Performance Monitoring

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  lighthouse-audit:
    name: 🔍 Lighthouse Performance Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📥 Install Dependencies
        run: npm ci
        
      - name: 🏗️ Build Application
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: 🚀 Start Application
        run: npm start &
        env:
          NODE_ENV: production
          PORT: 3000
          
      - name: ⏳ Wait for Server
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000 > /dev/null 2>&1; do sleep 2; done'
          
      - name: 🔍 Run Lighthouse CI
        run: npm run lighthouse:ci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          
      - name: 📊 Run Performance Monitor
        run: npm run monitor:performance
        continue-on-error: true
        
      - name: 📈 Upload Performance Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: |
            .lighthouseci/
            performance-history.json
          retention-days: 30
          
      - name: 💬 Performance Report Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            try {
              // Read performance history
              const historyPath = path.join(process.cwd(), 'performance-history.json');
              if (fs.existsSync(historyPath)) {
                const history = JSON.parse(fs.readFileSync(historyPath, 'utf8'));
                const latest = history.measurements[history.measurements.length - 1];
                
                if (latest) {
                  const comment = `## 🚀 Performance Report
            
            **Lighthouse Scores:**
            - 🎯 Performance: ${latest.metrics.performanceScore}/100 ${latest.metrics.performanceScore >= 90 ? '✅' : '⚠️'}
            - ♿ Accessibility: ${latest.metrics.accessibilityScore}/100 ${latest.metrics.accessibilityScore >= 100 ? '✅' : '❌'}
            - 🏆 Best Practices: ${latest.metrics.bestPracticesScore}/100 ${latest.metrics.bestPracticesScore >= 90 ? '✅' : '⚠️'}
            - 🔍 SEO: ${latest.metrics.seoScore}/100 ${latest.metrics.seoScore >= 100 ? '✅' : '❌'}
            
            **Core Web Vitals:**
            - 🎨 First Contentful Paint: ${latest.metrics.fcp}s ${latest.metrics.fcp <= 1.5 ? '✅' : '⚠️'}
            - 🖼️ Largest Contentful Paint: ${latest.metrics.lcp}s ${latest.metrics.lcp <= 2.5 ? '✅' : '⚠️'}
            - 📐 Cumulative Layout Shift: ${latest.metrics.cls} ${latest.metrics.cls <= 0.1 ? '✅' : '⚠️'}
            - ⏱️ Total Blocking Time: ${latest.metrics.tbt}ms ${latest.metrics.tbt <= 300 ? '✅' : '⚠️'}
            
            **Bundle Analysis:**
            - 📦 Total Size: ${(latest.metrics.totalByteWeight / 1024).toFixed(1)} KB
            - 🗑️ Unused JS: ${(latest.metrics.unusedJavaScript / 1024).toFixed(1)} KB
            
            _Performance audit completed at ${latest.timestamp}_`;
                  
                  github.rest.issues.createComment({
                    issue_number: context.issue.number,
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    body: comment
                  });
                }
              }
            } catch (error) {
              console.log('Could not post performance comment:', error.message);
            }

  bundle-analysis:
    name: 📦 Bundle Size Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📥 Install Dependencies
        run: npm ci
        
      - name: 📊 Analyze Bundle
        run: npm run build:analyze
        env:
          NODE_ENV: production
          
      - name: 📈 Upload Bundle Report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: |
            .next/analyze/
            .next/static/chunks/
          retention-days: 30

  security-audit:
    name: 🔒 Security & Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📥 Install Dependencies
        run: npm ci
        
      - name: 🔍 Security Audit
        run: npm run audit:deps
        continue-on-error: true
        
      - name: 🛡️ Check for Vulnerable Dependencies
        run: |
          # Create detailed security report
          npm audit --audit-level=moderate --json > security-report.json || true
          
          # Check if there are any high or critical vulnerabilities
          CRITICAL=$(cat security-report.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat security-report.json | jq '.metadata.vulnerabilities.high // 0')
          
          echo "Critical vulnerabilities: $CRITICAL"
          echo "High vulnerabilities: $HIGH"
          
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ Found critical or high severity vulnerabilities!"
            npm audit --audit-level=high
            exit 1
          else
            echo "✅ No critical or high severity vulnerabilities found"
          fi
          
      - name: 📊 Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit
          path: security-report.json
          retention-days: 30