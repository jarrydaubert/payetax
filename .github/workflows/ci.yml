name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Lockfile policy guard
        shell: bash
        run: |
          set -euo pipefail
          for f in package-lock.json yarn.lock pnpm-lock.yaml bun.lockb; do
            if [ -f "$f" ]; then
              echo "Disallowed lockfile present: $f"
              exit 1
            fi
          done

      - name: Tracked env guard
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files --error-unmatch .env .env.local .env.production 2>/dev/null; then
            echo "An env file is tracked in git. Move secrets to provider env vars."
            exit 1
          fi
          exit 0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Repo checks
        run: bun run check:repo

      - name: Dependency audit
        run: bun run audit:deps

      - name: Build
        run: bun run build
