name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Lockfile policy guard
        shell: bash
        run: |
          set -euo pipefail
          for f in package-lock.json yarn.lock pnpm-lock.yaml bun.lockb; do
            if [ -f "$f" ]; then
              echo "Disallowed lockfile present: $f"
              exit 1
            fi
          done

      - name: Tracked env guard
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files --error-unmatch .env .env.local .env.production 2>/dev/null; then
            echo "An env file is tracked in git. Move secrets to provider env vars."
            exit 1
          fi
          exit 0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Repo checks
        run: bun run check:repo

      - name: Tests
        run: bun run test:ci

      - name: Dependency audit
        run: bun run audit:deps

      - name: Build
        run: bun run build:ci

  # Non-blocking while flake behaviour on CI runners is measured.
  # Promote to a required check once it has run clean for a week.
  e2e-critical:
    name: E2E critical (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Run critical E2E (smoke + golden master, chromium)
        run: bun run test:e2e:critical:ci

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-report
          path: audit-outputs/blob-report
          retention-days: 7
