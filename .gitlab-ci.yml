# GitLab CI/CD Pipeline for PayeTax - OPTIMIZED for Free Tier
# Target: < 100 minutes/month (75% reduction from 400 minute limit)
#
# Strategy: Skip CI on main (Vercel handles everything), validate MRs only

stages:
  - validate

# Shared cache configuration
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .npm/

# ──────────────────────────────────────────────────────────
# OPTIMIZATION STRATEGY:
# ──────────────────────────────────────────────────────────
# 1. NO CI ON MAIN - Vercel handles all validation on push
# 2. Lightweight MR validation only (no tests, Vercel runs those)
# 3. Skip dependency installation when cache is warm
# 4. Skip security scans (GitHub Dependabot handles this)
# 5. Run only critical checks: typecheck + lint
# ──────────────────────────────────────────────────────────

# Single job: Fast validation for merge requests only
mr_validation:
  stage: validate
  image: node:20-alpine
  script:
    - echo "⚡ Quick MR validation (no CI on main - Vercel handles it)"
    # Use cache if available, otherwise install (faster with warm cache)
    - npm ci --cache .npm --prefer-offline --quiet
    # Critical checks only
    - npm run typecheck           # TypeScript (~30-60 sec)
    - npx biome check .           # Linting (~20-30 sec)
    - echo "✅ Validation passed! Vercel will handle build + tests on merge."
  cache:
    paths:
      - .npm/
  only:
    - merge_requests  # ONLY on MRs, NEVER on main
  timeout: 5 minutes

# ──────────────────────────────────────────────────────────
# WHY THIS WORKS:
# ──────────────────────────────────────────────────────────
# ✅ Vercel validates EVERYTHING on push to main:
#    - Build succeeds/fails
#    - Tests run (npm run build includes validation)
#    - Deployment succeeds/fails
#    - All automatic, zero GitLab minutes used
#
# ✅ GitHub Dependabot (free, external):
#    - Security vulnerability scanning
#    - Dependency updates
#    - Zero GitLab minutes used
#
# ✅ This pipeline ONLY validates MR syntax:
#    - TypeScript compiles
#    - Linting passes
#    - Fast feedback for contributors
#    - ~1.5 min per MR
# ──────────────────────────────────────────────────────────

# ⏱️  NEW ESTIMATED MONTHLY USAGE (FREE TIER: 400 MIN)
# ──────────────────────────────────────────────────────────
# Main pushes (252x/month):
#   - ZERO minutes (no CI on main!)
# 
# Merge requests (25x/month):
#   - Quick validation: ~1.5 min × 25 = 37.5 min
#
# Total: ~38 minutes/month ✅ (90% reduction!)
# Buffer: 362 minutes remaining
# ──────────────────────────────────────────────────────────

# ──────────────────────────────────────────────────────────
# WHAT RUNS WHERE:
# ──────────────────────────────────────────────────────────
# 
# LOCAL (Manual):
# - bun run fix-all (lint, format, typecheck)
# - bun run test:no-coverage (quick tests)
#
# GITLAB CI (This File):
# ✅ MRs only: Typecheck + lint (contributor validation)
#
# VERCEL (Automatic):
# ✅ Every push: Build + tests + deploy
# ✅ Main branch: Production deployment
# ✅ MRs: Preview deployments
#
# GITHUB (External, Free):
# ✅ Dependabot: Security scanning + updates
# ──────────────────────────────────────────────────────────
