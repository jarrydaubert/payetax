# GitLab CI/CD Pipeline for PayeTax
# Automates testing, building, security scanning, and deployment to Vercel

stages:
  - security
  - test
  - build
  - deploy

# Cache node_modules for faster builds
cache:
  paths:
    - node_modules/
    - .npm/

# Secret Detection - Scan for exposed credentials
secret_detection:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - echo "Scanning for exposed secrets..."
    - |
      # Check for common secret patterns in Git history
      git log --all --full-history --pretty=format:"%H %s" | while read commit_hash commit_msg; do
        if git diff-tree --no-commit-id --name-only -r $commit_hash | xargs git show $commit_hash | grep -iE '(password|api[_-]?key|secret|token|auth|credential)' | grep -vE '(example|placeholder|your-)'; then
          echo "⚠️  Potential secret found in commit $commit_hash: $commit_msg"
        fi
      done
    - echo "Secret detection complete"
  allow_failure: true
  only:
    - merge_requests
    - main
    - tags

# Test stage - Run linting and unit tests
test:
  stage: test
  image: node:20-alpine
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint
    - npm test # Run unit tests
    - npm run typecheck # TypeScript validation
  only:
    - merge_requests
    - main
    - develop

# Build stage - Create production build
build:
  stage: build
  image: node:20-alpine
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  only:
    - main
    - tags

# Deploy to Vercel Production
deploy_production:
  stage: deploy
  image: node:20-alpine
  before_script:
    - npm install -g vercel@latest
  script:
    - echo "Deploying to Vercel Production..."
    - vercel --token $VERCEL_TOKEN --prod --yes
  environment:
    name: production
    url: https://payetax.co.uk
  only:
    - main
    - tags
  when: manual # Require manual approval for production deploys

# Deploy Preview for Merge Requests
deploy_preview:
  stage: deploy
  image: node:20-alpine
  before_script:
    - npm install -g vercel@latest
  script:
    - echo "Deploying preview for MR !$CI_MERGE_REQUEST_IID..."
    - vercel --token $VERCEL_TOKEN --name payetax-preview-$CI_MERGE_REQUEST_IID --yes
  environment:
    name: preview/$CI_MERGE_REQUEST_IID
    url: $CI_ENVIRONMENT_URL
    on_stop: stop_preview
  only:
    - merge_requests
  except:
    - main

# Stop preview environment when MR is closed
stop_preview:
  stage: deploy
  image: node:20-alpine
  before_script:
    - npm install -g vercel@latest
  script:
    - echo "Cleaning up preview deployment..."
    - vercel remove --token $VERCEL_TOKEN --safe --yes
  environment:
    name: preview/$CI_MERGE_REQUEST_IID
    action: stop
  when: manual
  only:
    - merge_requests

# Dependency security audit
dependency_audit:
  stage: security
  image: node:20-alpine
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - echo "Running dependency security audit..."
    - npm audit --audit-level=high
  allow_failure: true
  only:
    - main
    - merge_requests
    - tags

