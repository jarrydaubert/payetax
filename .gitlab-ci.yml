# GitLab CI/CD Pipeline for ToolHubX
# Automates testing, building, and deployment to Vercel

stages:
  - test
  - build
  - deploy

# Cache node_modules for faster builds
cache:
  paths:
    - node_modules/
    - .npm/

# Test stage - Run linting, type checking, and unit tests
test:
  stage: test
  image: node:18-alpine
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint
    - npm test # Run unit tests
    - npm run build # This includes TypeScript type checking
  only:
    - merge_requests
    - main
    - develop

# Build stage - Create production build
build:
  stage: build
  image: node:18-alpine
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  only:
    - main
    - tags

# Deploy to Vercel Production
deploy_production:
  stage: deploy
  image: node:18-alpine
  before_script:
    - npm install -g vercel@latest
  script:
    - echo "Deploying to Vercel Production..."
    - vercel --token $VERCEL_TOKEN --prod --yes
  environment:
    name: production
    url: https://toolhubx.uk
  only:
    - main
    - tags
  when: manual # Require manual approval for production deploys

# Deploy Preview for Merge Requests
deploy_preview:
  stage: deploy
  image: node:18-alpine
  before_script:
    - npm install -g vercel@latest
  script:
    - echo "Deploying preview..."
    - vercel --token $VERCEL_TOKEN --yes
  environment:
    name: preview/$CI_MERGE_REQUEST_IID
    url: $CI_ENVIRONMENT_URL
    on_stop: stop_preview
  only:
    - merge_requests
  except:
    - main

# Stop preview environment when MR is closed
stop_preview:
  stage: deploy
  image: node:18-alpine
  before_script:
    - npm install -g vercel@latest
  script:
    - echo "Cleaning up preview deployment..."
    - vercel remove --token $VERCEL_TOKEN --safe --yes
  environment:
    name: preview/$CI_MERGE_REQUEST_IID
    action: stop
  when: manual
  only:
    - merge_requests

# Security scan for dependencies (optional)
security_scan:
  stage: test
  image: node:18-alpine
  script:
    - npm audit --audit-level=high
  allow_failure: true
  only:
    - main
    - merge_requests

# Variables needed in GitLab CI/CD Settings:
# VERCEL_TOKEN - Vercel CLI token for deployments
# VERCEL_ORG_ID - Your Vercel organization ID  
# VERCEL_PROJECT_ID - Your Vercel project ID
