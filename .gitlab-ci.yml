# GitLab CI/CD Pipeline for PayeTax (Optimized for Free Tier)
# Only runs tests/linting - Vercel handles builds/deployments automatically

stages:
  - security
  - test

# Cache node_modules for faster builds
cache:
  paths:
    - node_modules/
    - .npm/

# Secret Detection - Scan for exposed credentials
secret_detection:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - echo "Scanning for exposed secrets..."
    - |
      # Check for common secret patterns in Git history
      git log --all --full-history --pretty=format:"%H %s" | while read commit_hash commit_msg; do
        if git diff-tree --no-commit-id --name-only -r $commit_hash | xargs git show $commit_hash | grep -iE '(password|api[_-]?key|secret|token|auth|credential)' | grep -vE '(example|placeholder|your-)'; then
          echo "⚠️  Potential secret found in commit $commit_hash: $commit_msg"
        fi
      done
    - echo "Secret detection complete"
  allow_failure: true
  only:
    - merge_requests
    - main

# Quality Checks - Linting and TypeScript
quality:
  stage: test
  image: node:20-alpine
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - echo "Running code quality checks..."
    - npm run format -- --check  # Check formatting (don't auto-fix in CI)
    - npx biome check .          # Linting
    - npm run typecheck          # TypeScript validation
  only:
    - merge_requests
    - main
    - develop

# Unit Tests - Fast, cheap to run
test:unit:
  stage: test
  image: node:20-alpine
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run test -- --coverage --watchAll=false
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: audit-outputs/coverage/cobertura-coverage.xml
    paths:
      - audit-outputs/coverage/
    expire_in: 7 days
  only:
    - merge_requests
    - main
    - develop

# E2E Tests - Only on merge requests (expensive, ~10-15 min runtime)
# Comment out if you want to save more minutes
test:e2e:
  stage: test
  image: mcr.microsoft.com/playwright:v1.56.0-focal
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run test:dev  # Quick Chrome-only E2E instead of full suite
  artifacts:
    when: always
    paths:
      - audit-outputs/playwright-report/
    expire_in: 7 days
  only:
    - merge_requests  # Only on MRs, not main branch
  allow_failure: false

# Dependency security audit
dependency_audit:
  stage: security
  image: node:20-alpine
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - echo "Running dependency security audit..."
    - npm audit --audit-level=high
  allow_failure: true
  only:
    - main
    - merge_requests

# NOTE: Build and Deploy stages removed
# Vercel handles this automatically via Git integration (free, no runner minutes used)
# Every push to main auto-deploys to production at payetax.co.uk
# Merge requests get automatic preview deployments from Vercel
