# GitLab CI/CD Pipeline for PayeTax - OPTIMIZED for Free Tier
# Target: < 100 minutes/month (staying well under 400 minute limit)
#
# Strategy: Run validation on MRs only, Vercel handles main branch

stages:
  - validate

# Prevent pipelines for pushes/tags; run ONLY for merge requests
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - when: never

variables:
  # Bun cache directory
  BUN_INSTALL_CACHE_DIR: "$CI_PROJECT_DIR/.bun-cache"
  # Reuse Playwright browser binaries across MR jobs.
  PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.cache/ms-playwright"

# Cache bun dependencies - shared across all branches until bun.lock changes
cache:
  key:
    files:
      - bun.lock
  paths:
    - .bun-cache/
    - .cache/ms-playwright/
    - node_modules/
  policy: pull-push

# ──────────────────────────────────────────────────────────
# OPTIMIZATION STRATEGY:
# ──────────────────────────────────────────────────────────
# 1. NO CI ON MAIN - Vercel handles all validation on push
# 2. MR validation gates split into parallel jobs
# 3. Bun for fast dependency installation
# 4. Cache shared across branches (keyed to bun.lock), including Playwright browsers
# 5. Interruptible - stops old jobs when new commits push
# ──────────────────────────────────────────────────────────

.mr_base:
  stage: validate
  # Keep CI Bun version aligned with package.json "packageManager" (bun@1.3.x).
  image: oven/bun:1.3-debian
  interruptible: true
  before_script:
    - bun --version
    # Install dependencies (fast with warm cache)
    - bun install --frozen-lockfile
  rules:
    # Skip for docs-only changes
    - changes:
        - "**/*.md"
        - "content/**/*.mdx"
        - "docs/**"
        - ".github/**"
      when: never
    - when: on_success

mr_lint_typecheck:
  extends: .mr_base
  script:
    - 'echo "MR validation: lint + typecheck"'
    - bun run lint
    - bun run typecheck
    - 'echo "Lint + typecheck passed!"'
  timeout: 15 minutes

mr_unit_tests:
  extends: .mr_base
  script:
    - 'echo "MR validation: unit tests"'
    - bun run test:no-coverage
    - 'echo "Unit tests passed!"'
  timeout: 20 minutes

mr_build:
  extends: .mr_base
  script:
    - 'echo "MR validation: production build"'
    - bun run build
    - 'echo "Build passed!"'
  timeout: 20 minutes

mr_e2e_critical:
  extends: .mr_base
  script:
    - 'echo "MR validation: critical E2E"'
    - bunx playwright install --with-deps chromium
    - bun run test:e2e:critical
    - 'echo "Critical E2E passed!"'
  timeout: 30 minutes

# ──────────────────────────────────────────────────────────
# WHAT RUNS WHERE:
# ──────────────────────────────────────────────────────────
#
# LOCAL (Manual):
#   bun run fix-all       - lint, format, typecheck
#   bun run test          - unit tests with coverage
#   bun run test:e2e      - Playwright E2E tests
#
# GITLAB CI (This File - MRs only, parallel jobs):
#   ✅ Lint (biome check .)
#   ✅ Typecheck (tsc --noEmit)
#   ✅ Unit tests (jest --no-coverage)
#   ✅ Build (next build)
#   ✅ Critical E2E (Playwright smoke + golden)
#   ⏱️  Cached Playwright browsers + parallel jobs to reduce MR wall time
#
# VERCEL (Automatic - every push):
#   ✅ Build validation (next build)
#   ✅ Preview deployments (MRs)
#   ✅ Production deployment (main)
#
# GITHUB (External, Free):
#   ✅ Dependabot: Security scanning + dependency updates
#
# ──────────────────────────────────────────────────────────

# ⏱️  ESTIMATED MONTHLY USAGE (FREE TIER: 400 MIN)
# ──────────────────────────────────────────────────────────
# Main pushes: ZERO minutes (no CI, workflow rules block it)
# Merge requests (~25/month): estimate depends on test/runtime
# Buffer: monitor monthly usage
# ──────────────────────────────────────────────────────────
